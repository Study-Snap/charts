apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: {{ .Values.ingress.certManager.clusterIssuer }}
    external-dns.alpha.kubernetes.io/hostname: {{ .Values.ingress.host }}
    nginx.ingress.kubernetes.io/proxy-body-size: "{{ .Values.ingress.maxRequestSize }}"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "180"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "180"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "180"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "180"
  name: {{ include "neptune.fullname" . }}-ingress
  namespace: {{ .Values.namespace }}
spec:
  tls:
    - hosts:
      - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.certManager.tlsSecretName }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: {{ .Values.ingress.paths.root | quote }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "neptune.fullname" . }}-service
                port:
                  number: {{ .Values.service.port }}
          - path: {{ .Values.ingress.paths.docs | quote }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "neptune.fullname" . }}-service
                port:
                  number: {{ .Values.service.port }}