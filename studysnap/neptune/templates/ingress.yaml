apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: {{ .Values.ingress.certManager.clusterIssuer }}
    nginx.ingress.kubernetes.io/client-max-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "10m"
  name: {{ include "neptune.fullname" . }}-ingress
  namespace: {{ .Values.namespace }}
spec:
  tls:
    - hosts:
      - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.certManager.tlsSecretName }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /neptune
            pathType: Prefix
            backend:
              service:
                name: {{ include "neptune.fullname" . }}-service
                port:
                  number: {{ .Values.service.port }}
          - path: /neptune/docs
            pathType: Prefix
            backend:
              service:
                name: {{ include "neptune.fullname" . }}-service
                port:
                  number: {{ .Values.service.port }}